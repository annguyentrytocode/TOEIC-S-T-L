<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC S-T&L</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tích hợp chuẩn duy nhất font Google Sans */
        @font-face {
            font-family: 'Google Sans';
            src: local('Google Sans'), local('GoogleSans-Regular');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Google Sans';
            src: local('Google Sans Medium'), local('GoogleSans-Medium');
            font-weight: 500;
        }
        @font-face {
            font-family: 'Google Sans';
            src: local('Google Sans Bold'), local('GoogleSans-Bold');
            font-weight: 700;
        }

        body { 
            font-family: 'Google Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #F3F4F6;
        }
        
        .app-container {
            background-color: #FFFFFF;
            min-height: 100vh;
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hidden-page { display: none !important; }
        
        .curved-header {
            background-color: #5B73E8;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            color: white;
            padding: 50px 20px 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 20px rgba(91, 115, 232, 0.2);
        }

        .menu-btn {
            background: white;
            border: 1px solid #E5E7EB;
            color: #5B73E8;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.125rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .menu-btn:active { transform: scale(0.98); }

        .option-btn {
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            font-weight: 500;
            font-size: 1rem;
            color: #1F2937;
            background: white;
            transition: all 0.2s;
        }
        
        .option-correct { border-color: #10B981; color: #10B981; background-color: #ECFDF5; }
        .option-incorrect { border-color: #EF4444; color: #EF4444; background-color: #FEF2F2; }
        
        .progress-container { width: 100%; background-color: #E5E7EB; height: 4px; }
        .progress-fill { background-color: #5B73E8; height: 100%; transition: width 0.3s ease; }

        .review-card { border-left: 4px solid #F56565; }

        /* ---------- ANIMATIONS ---------- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes popOut {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popOut 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home-page" class="app-container animate-fade-in">
        <div class="curved-header flex flex-col items-center justify-center min-h-[35vh]">
            <div class="text-3xl mb-1">✦</div>
            <h1 class="text-5xl font-bold tracking-tight mb-2">TOEIC</h1>
            <p class="text-sm opacity-90 font-medium">Self Testing & Learning</p>
        </div>
        
        <div class="flex-1 px-6 py-10 flex flex-col items-center">
            <!-- MAIN NAV -->
            <div id="main-nav" class="w-full flex flex-col gap-4 mt-8 animate-fade-in">
                <button onclick="showMenu('test-menu')" class="menu-btn">TESTING</button>
                <button onclick="showMenu('learn-menu')" class="menu-btn">LEARNING</button>
            </div>

            <!-- TEST MENU -->
            <div id="test-menu" class="hidden-page w-full flex flex-col gap-4 w-full mt-4 animate-fade-in">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest text-center mb-2">Chọn Kiểu Test</h3>
                <button onclick="startApp('test', 'micro')" class="menu-btn !text-gray-700 hover:!text-[#5B73E8]">Micro - Testing</button>
                <button onclick="startApp('test', 'extreme')" class="menu-btn !text-gray-700 hover:!text-[#5B73E8]">Extreme Mock</button>
                <button onclick="showMenu('main-nav')" class="mt-4 text-sm text-gray-400 font-medium">← Quay lại</button>
            </div>

            <!-- LEARN MENU -->
            <div id="learn-menu" class="hidden-page w-full flex flex-col gap-4 w-full mt-4 animate-fade-in">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest text-center mb-2">Chọn Kiểu Học</h3>
                <button onclick="startApp('learn', 'vocab')" class="menu-btn !text-gray-700 hover:!text-[#5B73E8]">Vocabulary Focus</button>
                <button onclick="startApp('learn', 'grammar')" class="menu-btn !text-gray-700 hover:!text-[#5B73E8]">Grammar Focus</button>
                <button onclick="showMenu('main-nav')" class="mt-4 text-sm text-gray-400 font-medium">← Quay lại</button>
            </div>

            <div id="loading-indicator" class="mt-auto text-xs text-gray-400">Đang khởi tạo hệ thống...</div>
        </div>
    </div>

    <!-- QUIZ PAGE -->
    <div id="quiz-page" class="hidden-page app-container bg-white animate-fade-in">
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
            <button onclick="goHome()" class="text-xl text-gray-400 hover:text-gray-700 px-2">←</button>
            <div id="timer-display" class="font-bold text-[#5B73E8] bg-blue-50 px-3 py-1 rounded-full text-sm hidden">TIME 00:00</div>
            <div id="question-counter" class="font-bold text-gray-700 text-sm">Question 1/100</div>
        </div>

        <div class="progress-container">
            <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
        </div>

        <div class="p-6 flex flex-col flex-1 overflow-y-auto">
            <div id="question-tag" class="text-[10px] font-bold px-3 py-1 bg-gray-100 text-gray-500 rounded-full w-max mb-6 uppercase tracking-wider">TỪ VỰNG</div>

            <div class="mb-8 min-h-[100px]">
                <p id="question-text" class="text-[1.1rem] font-medium leading-relaxed text-gray-800"></p>
            </div>

            <div class="text-xs font-bold text-gray-400 mb-3">Choosing answer</div>
            <div id="options-container" class="flex flex-col gap-3 mb-6"></div>

            <button id="feedback-area" class="w-full py-4 rounded-xl font-bold text-white hidden mb-4 transition-colors pointer-events-none"></button>
            
            <div id="hint-text" class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-xl text-sm text-gray-700 hidden"></div>

            <div class="flex justify-between items-center mt-auto pt-4">
                <div class="flex gap-2" id="support-tools">
                    <button id="btn-5050" onclick="use5050()" class="w-12 h-12 rounded-full border border-gray-300 text-gray-500 font-bold flex items-center justify-center hover:bg-gray-50 transition-colors">50%</button>
                    <!-- Nút Suggest Toggle -->
                    <button id="btn-suggest" onclick="toggleHint()" class="px-5 py-2 rounded-full border border-gray-300 text-gray-600 font-bold hover:bg-gray-50 transition-colors">Suggest</button>
                </div>
                <button id="btn-next" onclick="nextQuestion()" class="bg-[#1A202C] text-white px-8 py-3 rounded-full font-bold hidden hover:bg-black transition-colors shadow-md">Tiếp tục</button>
            </div>
        </div>
    </div>

    <!-- RESULT PAGE -->
    <div id="result-page" class="hidden-page app-container bg-[#F9FAFB] animate-fade-in">
        <div class="curved-header flex flex-col items-center justify-center min-h-[25vh]">
            <h2 class="text-xl font-bold opacity-90 tracking-widest mb-1 uppercase" id="score-label">TỔNG ĐIỂM</h2>
            <h1 id="final-score" class="text-6xl font-bold">0</h1>
        </div>

        <div class="flex-1 p-6 flex flex-col items-center">
            <div id="tier-tag" class="px-6 py-2 rounded-full font-bold text-sm mb-6 tracking-wide hidden text-white mt-4 shadow-sm animate-pop"></div>

            <div id="detailed-feedback-container" class="w-full bg-white rounded-2xl p-5 mb-6 shadow-sm border border-gray-100 hidden animate-fade-in" style="animation-delay: 0.2s;">
                <p id="detailed-feedback" class="text-gray-600 text-sm leading-relaxed text-center font-medium"></p>
            </div>
            
            <div id="stats-breakdown" class="w-full flex gap-4 mb-8 text-center hidden animate-fade-in" style="animation-delay: 0.4s;">
                <div class="bg-white p-4 rounded-2xl flex-1 border border-gray-100 shadow-sm">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Từ vựng</p>
                    <p id="stat-vocab" class="text-xl font-bold text-[#5B73E8]">0/0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl flex-1 border border-gray-100 shadow-sm">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Ngữ pháp</p>
                    <p id="stat-grammar" class="text-xl font-bold text-[#10B981]">0/0</p>
                </div>
            </div>

            <div class="w-full flex flex-col gap-3 mt-auto">
                <button id="btn-review" onclick="showReview()" class="bg-[#5B73E8] text-white w-full py-4 rounded-xl font-bold text-[1rem] hover:opacity-90 transition-opacity shadow-md hidden animate-fade-in" style="animation-delay: 0.6s;">Review câu sai</button>
                <button onclick="goHome()" class="bg-white border border-gray-200 text-gray-600 w-full py-4 rounded-xl font-bold text-[1rem] hover:bg-gray-50 transition-colors shadow-sm">Về trang chủ</button>
            </div>
        </div>
    </div>

    <!-- REVIEW PAGE -->
    <div id="review-page" class="hidden-page app-container bg-[#F9FAFB] animate-fade-in">
        <div class="bg-white border-b border-gray-100 p-4 flex items-center justify-between z-10 shadow-sm">
            <h2 class="font-bold text-[1rem] text-gray-800">Review Câu Sai</h2>
            <button onclick="closeReview()" class="text-[#5B73E8] font-bold text-sm bg-blue-50 px-3 py-1 rounded-full">Đóng</button>
        </div>
        <div id="review-container" class="p-4 flex flex-col gap-4 overflow-y-auto flex-1 pb-10"></div>
    </div>

    <script>
        let allVocab = [];
        let allGrammar = [];
        let currentSessionQuestions = [];
        let wrongAnswersData = [];
        let currentIndex = 0;
        
        let scoreData = { vocab: { correct: 0, total: 0 }, grammar: { correct: 0, total: 0 } };
        
        let appCategory = '';
        let appMode = '';
        let timerInterval;
        let secondsElapsed = 0;
        let timeLimit = 0;
        let hasAnsweredCurrent = false;

        window.onload = () => {
            Promise.all([
                fetch('vocab.json').then(res => res.json()).catch(() => []),
                fetch('gramar.json').then(res => res.json()).catch(() => []) 
            ]).then(([vocabData, grammarData]) => {
                allVocab = parseRobustData(vocabData, 'vocab');
                allGrammar = parseRobustData(grammarData, 'grammar');
                let indicator = document.getElementById('loading-indicator');
                if (allVocab.length > 0 && allGrammar.length > 0) {
                    indicator.innerText = `Hệ thống sẵn sàng: ${allVocab.length} Từ vựng | ${allGrammar.length} Ngữ pháp`;
                    indicator.classList.add('text-[#10B981]');
                } else {
                    indicator.innerText = `Lỗi dữ liệu. Kiểm tra lại vocab.json / gramar.json`;
                    indicator.classList.add('text-[#EF4444]');
                }
            });
        };

        function showMenu(menuId) {
            document.getElementById('main-nav').classList.add('hidden-page');
            document.getElementById('test-menu').classList.add('hidden-page');
            document.getElementById('learn-menu').classList.add('hidden-page');
            document.getElementById(menuId).classList.remove('hidden-page');
        }

        function parseRobustData(data, typeTag) {
            let extractedArray = [];
            if (Array.isArray(data)) extractedArray = data;
            else if (typeof data === 'object') {
                for (let key in data) {
                    if (Array.isArray(data[key])) extractedArray = extractedArray.concat(data[key]);
                }
            }
            
            // THUẬT TOÁN LỌC TRÙNG LẶP (Deduplication)
            let uniqueSet = new Set();
            return extractedArray.filter(q => {
                let questionKey = Object.keys(q).find(k => k.toLowerCase().includes('question') || k.toLowerCase().includes('cauhoi'));
                let rawQuestion = questionKey ? q[questionKey] : Object.values(q).find(v => typeof v === 'string' && v.includes('___'));
                
                if (!rawQuestion || String(rawQuestion).trim() === "") return false;
                
                // Chuẩn hóa string để đối chiếu (Xóa số thứ tự, gạch dưới, đổi thành chữ thường)
                let cleanString = String(rawQuestion).replace(/^(Sample\s*)?Question\s*\d+:\s*/i, '').replace(/[-_]{3,}/g, '_____').trim().toLowerCase();
                
                if (uniqueSet.has(cleanString)) return false; // Phát hiện trùng -> Loại bỏ ngay
                
                uniqueSet.add(cleanString); // Thêm vào danh sách câu hỏi độc nhất
                return true;
            }).map(q => ({ ...q, _questionType: typeTag }));
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startApp(category, mode) {
            if (allVocab.length === 0 && allGrammar.length === 0) return;

            appCategory = category;
            appMode = mode;
            scoreData.vocab.correct = 0;
            scoreData.grammar.correct = 0;
            wrongAnswersData = [];
            currentIndex = 0;
            hasAnsweredCurrent = false;
            
            let vCount = 0;
            let gCount = 0;
            
            let timerDisplay = document.getElementById('timer-display');
            let supportTools = document.getElementById('support-tools');
            
            if (category === 'test') {
                timerDisplay.classList.remove('hidden');
                // ẨN HOÀN TOÀN TÍNH NĂNG 50/50 VÀ SUGGEST KHI VÀO TEST
                supportTools.classList.add('hidden');
                document.getElementById('btn-next').classList.remove('ml-auto'); 
                document.getElementById('btn-next').classList.add('w-full');
                
                if (mode === 'micro') { vCount = 25; gCount = 25; timeLimit = 15 * 60; } 
                else if (mode === 'extreme') { vCount = 100; gCount = 100; timeLimit = 100 * 60; }
                
                timerDisplay.className = "font-bold text-[#5B73E8] bg-blue-50 px-3 py-1 rounded-full text-sm";
            } else if (category === 'learn') {
                timerDisplay.classList.add('hidden');
                supportTools.classList.remove('hidden');
                document.getElementById('btn-next').classList.add('ml-auto');
                document.getElementById('btn-next').classList.remove('w-full');
                
                if (mode === 'vocab') { vCount = 50; gCount = 0; } 
                else if (mode === 'grammar') { vCount = 0; gCount = 50; }
            }

            let shuffledVocab = shuffle([...allVocab]);
            let shuffledGrammar = shuffle([...allGrammar]);
            
            vCount = Math.min(vCount, shuffledVocab.length);
            gCount = Math.min(gCount, shuffledGrammar.length);
            scoreData.vocab.total = vCount;
            scoreData.grammar.total = gCount;

            currentSessionQuestions = shuffle([...shuffledVocab.slice(0, vCount), ...shuffledGrammar.slice(0, gCount)]);
            if(currentSessionQuestions.length === 0) return;

            document.getElementById('home-page').classList.add('hidden-page');
            document.getElementById('result-page').classList.add('hidden-page');
            document.getElementById('review-page').classList.add('hidden-page');
            document.getElementById('quiz-page').classList.remove('hidden-page');

            if (category === 'test') startTimer();
            loadQuestion();
        }

        function loadQuestion() {
            hasAnsweredCurrent = false;
            let q = currentSessionQuestions[currentIndex];
            
            document.getElementById('question-counter').innerText = `Question ${currentIndex + 1}/${currentSessionQuestions.length}`;
            let progress = ((currentIndex + 1) / currentSessionQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            
            let tagEl = document.getElementById('question-tag');
            tagEl.innerText = q._questionType === 'vocab' ? "TỪ VỰNG" : "NGỮ PHÁP";
            
            let questionKey = Object.keys(q).find(k => k.toLowerCase().includes('question') || k.toLowerCase().includes('cauhoi'));
            let rawQuestion = questionKey ? q[questionKey] : Object.values(q).find(v => typeof v === 'string' && v.includes('___'));
            let cleanQuestion = String(rawQuestion).replace(/^(Sample\s*)?Question\s*\d+:\s*/i, '');
            
            q._displayQuestion = cleanQuestion.replace(/[-_]{3,}/g, '_____'); 
            document.getElementById('question-text').innerHTML = cleanQuestion.replace(/[-_]{3,}/g, '<span class="inline-block w-16 border-b-2 border-[#1F2937]"></span>');
            
            let validOptions = [];
            let excludeKeywords = ['question', 'correct', 'hint', 'answer', 'hướng dẫn', 'giải thích', 'câu', 'gợi', 'suggest', '_questiontype', 'explanation', '_displayquestion', '_displayhint'];
            
            for (let key in q) {
                let cleanKey = key.trim().toLowerCase();
                if (!excludeKeywords.some(ex => cleanKey.includes(ex))) {
                    let val = q[key];
                    if (val !== undefined && val !== null && String(val).trim() !== '') {
                        validOptions.push({ keyOriginal: key, text: String(val).trim() });
                    }
                }
            }
            let finalOptions = validOptions.length > 4 ? validOptions.sort((a, b) => a.keyOriginal.length - b.keyOriginal.length).slice(0, 4) : validOptions;

            let correctKey = Object.keys(q).find(k => k.toLowerCase().includes('correct') || k.toLowerCase().includes('answer') || k.toLowerCase().includes('dapan') || k.toLowerCase().includes('đáp'));
            let correctKeyFromExcel = correctKey ? String(q[correctKey]).trim().toLowerCase() : "";
            let actualCorrectText = correctKeyFromExcel;

            if (correctKeyFromExcel.length === 1 && ['a', 'b', 'c', 'd'].includes(correctKeyFromExcel)) {
                for(let k in q) {
                    let cleanK = k.trim().toLowerCase();
                    if (cleanK === correctKeyFromExcel || cleanK === `option ${correctKeyFromExcel}` || cleanK.endsWith(` ${correctKeyFromExcel}`)) {
                        actualCorrectText = String(q[k]).trim().toLowerCase();
                        break;
                    }
                }
            }

            let correctTextSaved = actualCorrectText;
            finalOptions.forEach(optObj => {
                let cleanOptKey = optObj.keyOriginal.trim().toLowerCase();
                let cleanOptText = optObj.text.toLowerCase();
                if (cleanOptKey === correctKeyFromExcel || cleanOptKey === `option ${correctKeyFromExcel}` || cleanOptKey.endsWith(` ${correctKeyFromExcel}`) || cleanOptText === correctKeyFromExcel || cleanOptText === actualCorrectText) {
                    correctTextSaved = optObj.text;
                }
            });

            let optionsHtml = '';
            shuffle([...finalOptions]).forEach(optObj => {
                let optText = optObj.text;
                let cleanOptKey = optObj.keyOriginal.trim().toLowerCase();
                let cleanOptText = optText.toLowerCase();
                let isThisBtnCorrect = false;
                
                if (cleanOptKey === correctKeyFromExcel || cleanOptKey === `option ${correctKeyFromExcel}` || cleanOptKey.endsWith(` ${correctKeyFromExcel}`) || cleanOptText === correctKeyFromExcel || cleanOptText === actualCorrectText) {
                    isThisBtnCorrect = true;
                }

                let safeOpt = optText.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, " ");
                let safeCorrectText = correctTextSaved.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, " ");
                
                optionsHtml += `
                    <button onclick="selectAnswer(this, ${isThisBtnCorrect}, '${q._questionType}', '${safeOpt}', '${safeCorrectText}')" 
                            data-correct="${isThisBtnCorrect}" 
                            class="option-btn hover:border-gray-400">
                        ${optText}
                    </button>
                `;
            });
            
            let hintKey = Object.keys(q).find(k => k.toLowerCase().includes('explanation') || k.toLowerCase().includes('hint') || k.toLowerCase().includes('giải'));
            q._displayHint = hintKey ? q[hintKey] : "Không có giải thích chi tiết.";

            document.getElementById('options-container').innerHTML = optionsHtml;
            
            // Xóa state animation của câu hỏi trước
            let feedback = document.getElementById('feedback-area');
            feedback.classList.add('hidden');
            feedback.classList.remove('animate-pop');

            let hintEl = document.getElementById('hint-text');
            hintEl.classList.add('hidden');
            hintEl.classList.remove('animate-pop');

            document.getElementById('btn-next').classList.add('hidden');
            
            if(appCategory === 'learn') {
                let btn5050 = document.getElementById('btn-5050');
                btn5050.disabled = false;
                btn5050.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function selectAnswer(btnElement, isCorrect, questionType, userSelectedText, correctText) {
            if(hasAnsweredCurrent) return;
            hasAnsweredCurrent = true;
            
            let q = currentSessionQuestions[currentIndex];
            
            if(!isCorrect && appCategory === 'test') {
                wrongAnswersData.push({
                    type: questionType, question: q._displayQuestion,
                    userAnswer: userSelectedText, correctAnswer: correctText, hint: q._displayHint
                });
            } else if (isCorrect) {
                if(questionType === 'vocab') scoreData.vocab.correct++;
                else scoreData.grammar.correct++;
            }

            let btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => {
                b.disabled = true;
                b.classList.remove('hover:border-gray-400');
                if(b.getAttribute('data-correct') === 'true') {
                    b.classList.add('option-correct');
                } else if(b === btnElement && !isCorrect) {
                    b.classList.add('option-incorrect');
                }
            });

            let feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');
            
            // Trigger animation nảy nhẹ
            feedback.style.animation = 'none';
            feedback.offsetHeight; 
            feedback.style.animation = null;
            feedback.classList.add('animate-pop');

            if(isCorrect) {
                feedback.innerText = "CHÍNH XÁC";
                feedback.className = "w-full py-4 rounded-xl font-bold text-white mb-4 bg-[#10B981] animate-pop pointer-events-none";
            } else {
                feedback.innerText = "KHÔNG CHÍNH XÁC";
                feedback.className = "w-full py-4 rounded-xl font-bold text-white mb-4 bg-[#EF4444] animate-pop pointer-events-none";
            }

            document.getElementById('btn-next').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex < currentSessionQuestions.length) { loadQuestion(); } 
            else { endSession(); }
        }

        function use5050() {
            if(hasAnsweredCurrent) return;
            let btns = Array.from(document.querySelectorAll('.option-btn'));
            let incorrectBtns = btns.filter(b => b.getAttribute('data-correct') !== 'true');
            
            shuffle(incorrectBtns);
            let hideCount = Math.min(2, incorrectBtns.length);
            for(let i=0; i<hideCount; i++) {
                incorrectBtns[i].classList.add('opacity-0', 'pointer-events-none');
            }
            
            let btn5050 = document.getElementById('btn-5050');
            btn5050.disabled = true;
            btn5050.classList.add('opacity-50', 'pointer-events-none');
        }

        // TÍNH NĂNG BẬT TẮT (TOGGLE) SUGGEST
        function toggleHint() {
            let hintEl = document.getElementById('hint-text');
            if(hintEl.classList.contains('hidden')) {
                let q = currentSessionQuestions[currentIndex];
                hintEl.innerText = q._displayHint;
                hintEl.classList.remove('hidden');
                hintEl.classList.add('animate-pop');
            } else {
                hintEl.classList.add('hidden');
                hintEl.classList.remove('animate-pop');
            }
        }

        function startTimer() {
            secondsElapsed = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                secondsElapsed++;
                let remaining = timeLimit - secondsElapsed;
                
                if(remaining <= 0) {
                    clearInterval(timerInterval);
                    endSession();
                    return;
                }

                let m = Math.floor(remaining / 60).toString().padStart(2, '0');
                let s = (remaining % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `TIME ${m}:${s}`;
                
                if(remaining < 300) {
                    document.getElementById('timer-display').className = "font-bold text-white bg-[#EF4444] px-3 py-1 rounded-full text-sm";
                }
            }, 1000);
        }

        // ANIMATION SỐ NHẢY TỪ 0 ĐẾN ĐIỂM THẬT
        function animateScore(element, targetScore, suffix = "", duration = 1500) {
            let startTime = null;
            function updateCounter(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = (currentTime - startTime) / duration;
                if (progress > 1) progress = 1;
                // Hiệu ứng chậm dần về đích (easeOutExpo)
                let currentVal = Math.floor(targetScore * (progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress)));
                element.innerText = currentVal + suffix;
                if (progress < 1) {
                    requestAnimationFrame(updateCounter);
                } else {
                    element.innerText = targetScore + suffix;
                }
            }
            requestAnimationFrame(updateCounter);
        }

        function endSession() {
            clearInterval(timerInterval);
            document.getElementById('quiz-page').classList.add('hidden-page');
            document.getElementById('result-page').classList.remove('hidden-page');
            
            let totalCorrect = scoreData.vocab.correct + scoreData.grammar.correct;
            let totalQs = scoreData.vocab.total + scoreData.grammar.total;
            
            document.getElementById('tier-tag').classList.add('hidden');
            document.getElementById('detailed-feedback-container').classList.add('hidden');
            document.getElementById('stats-breakdown').classList.add('hidden');
            document.getElementById('btn-review').classList.add('hidden');

            // Reset score element
            let scoreEl = document.getElementById('final-score');
            scoreEl.innerText = "0"; 

            if (appCategory === 'learn') {
                document.getElementById('score-label').innerText = "HOÀN THÀNH";
                // Chạy hiệu ứng cho Learn Mode (đếm đến số câu đúng)
                animateScore(scoreEl, totalCorrect, `/${totalQs}`);
            } else {
                let finalScore = 0;
                let tierTag = document.getElementById('tier-tag');
                tierTag.classList.remove('hidden');
                document.getElementById('detailed-feedback-container').classList.remove('hidden');
                document.getElementById('stats-breakdown').classList.remove('hidden');
                document.getElementById('btn-review').classList.remove('hidden');

                if (appMode === 'micro') {
                    finalScore = totalCorrect * 2;
                    document.getElementById('score-label').innerText = "THANG ĐIỂM 100";
                    if (finalScore < 40) { tierTag.innerText = "BÁO ĐỘNG"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#EF4444] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    else if (finalScore <= 60) { tierTag.innerText = "LƯU Ý"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#F59E0B] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    else if (finalScore <= 70) { tierTag.innerText = "TẠM ỔN"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#FBBF24] text-black mb-6 mt-4 shadow-sm animate-pop"; }
                    else if (finalScore <= 80) { tierTag.innerText = "KHÁ"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#3B82F6] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    else { tierTag.innerText = "TỐT"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#10B981] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    document.getElementById('detailed-feedback').innerText = "Hoàn thành bài Micro-testing. Hãy duy trì nhịp độ làm bài mỗi ngày để giữ cảm giác đọc hiểu.";
                } else {
                    finalScore = totalCorrect * 5;
                    document.getElementById('score-label').innerText = "THANG ĐIỂM 1000";
                    if (finalScore < 400) { tierTag.innerText = "BÁO ĐỘNG"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#EF4444] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    else if (finalScore <= 545) { tierTag.innerText = "LƯU Ý"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#F59E0B] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    else if (finalScore <= 645) { tierTag.innerText = "TẠM ỔN"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#FBBF24] text-black mb-6 mt-4 shadow-sm animate-pop"; }
                    else if (finalScore <= 845) { tierTag.innerText = "KHÁ"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#3B82F6] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    else { tierTag.innerText = "TỐT"; tierTag.className = "px-6 py-2 rounded-full font-bold text-sm tracking-wide bg-[#10B981] text-white mb-6 mt-4 shadow-sm animate-pop"; }
                    document.getElementById('detailed-feedback').innerText = "Bài test sức bền kết thúc. Bạn đã làm rất tốt, hãy review kỹ các câu sai để không lặp lại lỗi ở phòng thi thật.";
                }

                // Chạy hiệu ứng điểm tổng quát
                animateScore(scoreEl, finalScore);
                
                // Chạy hiệu ứng điểm thành phần
                animateScore(document.getElementById('stat-vocab'), scoreData.vocab.correct, `/${scoreData.vocab.total}`, 1000);
                animateScore(document.getElementById('stat-grammar'), scoreData.grammar.correct, `/${scoreData.grammar.total}`, 1000);
            }
        }

        function showReview() {
            document.getElementById('result-page').classList.add('hidden-page');
            document.getElementById('review-page').classList.remove('hidden-page');
            
            let container = document.getElementById('review-container');
            if (wrongAnswersData.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 mt-10 text-sm font-medium">Tuyệt vời! Bạn không sai câu nào.</div>`;
                return;
            }

            let html = '';
            wrongAnswersData.forEach((item, index) => {
                let tagColor = item.type === 'vocab' ? 'bg-blue-50 text-[#5B73E8]' : 'bg-green-50 text-[#10B981]';
                let tagText = item.type === 'vocab' ? 'Từ vựng' : 'Ngữ pháp';
                
                html += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 review-card">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[10px] font-bold px-2 py-1 ${tagColor} rounded-md uppercase">${tagText}</span>
                            <span class="text-xs font-bold text-gray-400">Câu ${index + 1}</span>
                        </div>
                        <p class="font-medium text-[1rem] text-gray-800 mb-4">${item.question}</p>
                        
                        <div class="flex flex-col gap-2 mb-4 text-sm bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <div class="flex items-start gap-2">
                                <span class="text-[#EF4444] font-bold w-16 shrink-0">Bạn chọn:</span>
                                <span class="text-gray-500 line-through">${item.userAnswer}</span>
                            </div>
                            <div class="flex items-start gap-2">
                                <span class="text-[#10B981] font-bold w-16 shrink-0">Đáp án:</span>
                                <span class="text-gray-900 font-bold">${item.correctAnswer}</span>
                            </div>
                        </div>
                        
                        <div class="bg-yellow-50 p-3 rounded-lg border border-yellow-100 text-xs text-gray-600 leading-relaxed">
                            <span class="font-bold text-yellow-700">Giải thích:</span> ${item.hint}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function closeReview() {
            document.getElementById('review-page').classList.add('hidden-page');
            document.getElementById('result-page').classList.remove('hidden-page');
        }

        function goHome() {
            clearInterval(timerInterval);
            document.getElementById('result-page').classList.add('hidden-page');
            document.getElementById('review-page').classList.add('hidden-page');
            document.getElementById('home-page').classList.remove('hidden-page');
            showMenu('main-nav'); 
        }
    </script>
</body>
</html>
